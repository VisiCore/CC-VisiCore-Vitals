# Product API access declaration for Vitals.
# At install time, admins see exactly which platform resources the app will use.
# All monitoring calls are read-only; the only writes are Notification CRUD,
# which powers the Email Alerts page (native Cribl notifications).

policies:
  # Worker groups / edge fleets inventory
  - object: '/master/groups'
    actions: ['GET']
  - object: '/master/groups/*'
    actions: ['GET']

  # Worker & edge node health, CPU/mem/disk, versions
  - object: '/master/workers'
    actions: ['GET']
  - object: '/master/summary/workers'
    actions: ['GET']

  # Internal throughput / volume / dropped-event metrics
  - object: '/system/metrics/query'
    actions: ['POST']

  # Leader/system info and daily license usage (for the Data Value dashboard)
  - object: '/system/info'
    actions: ['GET']
  - object: '/system/licenses/usage'
    actions: ['GET']

  # License quota, for the headroom projection on the Data Value dashboard
  - object: '/system/licenses'
    actions: ['GET']

  # Per-node CPU/memory history for the Worker Nodes sparklines.
  # Worker (/w/:wid) requests are authorized against the group-equivalent path,
  # so both must be declared.
  - object: '/w/:wid/system/metrics'
    actions: ['GET']
  - object: '/m/:gid/system/metrics'
    actions: ['GET']

  # System notifications (errors / warnings / info) for the Notifications page
  - object: '/system/messages'
    actions: ['GET']

  # Per-group Source and Destination config + authoritative runtime health
  # (status.health on these endpoints reflects real connection health)
  - object: '/m/:gid/system/inputs'
    actions: ['GET']
  - object: '/m/:gid/system/outputs'
    actions: ['GET']
  - object: '/m/:gid/system/status/inputs'
    actions: ['GET']
  - object: '/m/:gid/system/status/outputs'
    actions: ['GET']
  - object: '/m/:gid/health'
    actions: ['GET']
  - object: '/health'
    actions: ['GET']

  # Collection & scheduled job status + per-run task errors for the Collectors page
  - object: '/m/:gid/jobs'
    actions: ['GET']
  - object: '/m/:gid/jobs/*'
    actions: ['GET']

  # Email Alerts page — Vitals manages native Cribl Notifications wired to the
  # SMTP notification target; Cribl evaluates conditions and sends the email.
  - object: '/notification-targets'
    actions: ['GET']
  - object: '/m/:gid/notifications'
    actions: ['GET', 'POST']
  - object: '/m/:gid/notifications/*'
    actions: ['GET', 'PATCH', 'DELETE']
